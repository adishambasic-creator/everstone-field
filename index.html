<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#16130F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EverStone">
<link rel="manifest" href="manifest.json">
<title>EverStone Field</title>
<style>
  :root{
    --bg:#F4F3EF; --card:#FFFFFF;
    --ink:#1A1613; --ink-soft:#2B2620;
    --gold:#BF9B4F; --gold-deep:#9A7A36; --gold-tint:#F3EAD6;
    --text:#1C1A15; --text2:#4C463E; --muted:#938C81;
    --line:#ECE9E1;
    --green:#1E9460; --green-tint:#E3F3EB;
    --red:#D24A3C; --red-tint:#FBE9E6;
    --amber:#D98E0A; --amber-tint:#FBF0DA;
    --slate:#5E6B79; --slate-tint:#EAEDF0;
    --sh-sm:0 1px 2px rgba(26,22,19,.05);
    --sh:0 1px 3px rgba(26,22,19,.05),0 12px 26px -14px rgba(26,22,19,.18);
    --sh-lg:0 20px 50px -16px rgba(26,22,19,.28);
    --r:18px; --r-sm:13px;
    --ff:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--ff);
    font-weight:500;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    overscroll-behavior-y:none}
  body{padding-bottom:env(safe-area-inset-bottom)}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:16px}
  svg{display:block}
  .hidden{display:none!important}

  /* ---------- AUTH ---------- */
  #auth{min-height:100dvh;display:flex;flex-direction:column;justify-content:center;
    align-items:center;padding:30px;background:
      radial-gradient(130% 85% at 50% -10%, #2A2218 0%, var(--ink) 52%, #100D0A 100%)}
  .brand{text-align:center;margin-bottom:38px}
  .brand .mark{font-size:11.5px;letter-spacing:.36em;color:var(--gold);font-weight:700;
    text-transform:uppercase;margin-bottom:14px}
  .brand h1{margin:0;color:#F6F1E6;font-size:38px;font-weight:800;letter-spacing:-.025em}
  .brand .sub{color:#A79D8B;font-size:14px;margin-top:8px;font-weight:500}
  .authcard{width:100%;max-width:380px;background:var(--card);border-radius:22px;
    padding:26px 22px 22px;box-shadow:var(--sh-lg)}
  .field{margin-bottom:15px}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--text2);
    margin-bottom:7px}
  .field input{width:100%;padding:14px;border:1.5px solid var(--line);border-radius:13px;
    background:#FBFAF7;color:var(--text);font-weight:500;transition:border-color .15s,background .15s}
  .field input:focus{outline:none;border-color:var(--gold);background:#fff}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;
    border-radius:13px;font-size:15px;font-weight:700;letter-spacing:-.01em;
    transition:transform .06s ease,opacity .15s,box-shadow .15s}
  .btn:active{transform:scale(.98)}
  .btn-gold{background:var(--gold);color:#211808;box-shadow:0 6px 18px -6px rgba(154,122,54,.6)}
  .btn-gold:active{background:var(--gold-deep)}
  .btn-ghost{background:transparent;color:var(--muted);font-weight:600;font-size:14px;
    padding:11px;margin-top:4px}
  .authmsg{font-size:13.5px;text-align:center;margin-top:14px;min-height:18px;color:var(--red);
    font-weight:500}
  .authmsg.ok{color:var(--green)}

  /* ---------- APP CHROME ---------- */
  #app{min-height:100dvh;display:flex;flex-direction:column}
  #topwrap{position:sticky;top:0;z-index:40}
  .topbar{background:var(--ink);padding:calc(env(safe-area-inset-top) + 14px) 16px 14px;
    display:flex;align-items:center;gap:10px}
  .topbar .back{color:var(--gold);width:34px;height:34px;border-radius:11px;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.07)}
  .topbar .back:active{background:rgba(255,255,255,.14)}
  .topbar .ttl{flex:1;min-width:0}
  .topbar .ttl .k{font-size:10.5px;letter-spacing:.18em;color:var(--gold);text-transform:uppercase;
    font-weight:700;opacity:.85}
  .topbar .ttl .v{color:#F6F1E6;font-size:19px;font-weight:700;letter-spacing:-.02em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .topbar .act{color:#BDB3A2;font-size:13px;font-weight:600;padding:8px 6px;flex:0 0 auto}
  .topbar .act:active{color:#fff}

  .tabs{display:flex;gap:8px;overflow-x:auto;padding:12px 16px;background:var(--bg);
    scrollbar-width:none;border-bottom:1px solid var(--line)}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;padding:9px 15px;border-radius:999px;font-size:13.5px;font-weight:600;
    color:var(--text2);background:var(--card);box-shadow:var(--sh-sm);letter-spacing:-.01em;
    transition:transform .06s,background .15s,color .15s}
  .tab:active{transform:scale(.96)}
  .tab.on{color:#F6F1E6;background:var(--ink);box-shadow:0 6px 14px -6px rgba(26,22,19,.5)}

  .content{flex:1;padding:20px 16px 96px;max-width:680px;width:100%;margin:0 auto}

  /* ---------- HEADERS / BUTTONS ---------- */
  .sec-h{display:flex;align-items:center;justify-content:space-between;margin:2px 2px 16px}
  .sec-h h2{margin:0;font-size:23px;font-weight:800;letter-spacing:-.03em}
  .add{display:inline-flex;align-items:center;gap:6px;background:var(--ink);color:var(--gold);
    font-size:13.5px;font-weight:650;padding:10px 15px;border-radius:12px;letter-spacing:-.01em}
  .add:active{transform:scale(.97);opacity:.92}
  .add svg{width:16px;height:16px}

  /* ---------- CARDS / LISTS ---------- */
  .card{background:var(--card);border-radius:var(--r);padding:17px;margin-bottom:12px;
    box-shadow:var(--sh)}
  .card .row1{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .card .name{font-size:16px;font-weight:700;letter-spacing:-.015em}
  .card .sub{color:var(--muted);font-size:13.5px;margin-top:4px;line-height:1.45;font-weight:500}
  .amt{font-size:16.5px;font-weight:750;letter-spacing:-.02em;white-space:nowrap}

  .home-card{background:var(--card);border-radius:var(--r);padding:15px;margin-bottom:13px;
    box-shadow:var(--sh);display:flex;align-items:center;gap:14px;transition:transform .07s}
  .home-card:active{transform:scale(.985)}
  .home-ic{width:48px;height:48px;border-radius:14px;flex:0 0 auto;display:flex;align-items:center;
    justify-content:center;background:var(--gold-tint);color:var(--gold-deep)}
  .home-ic svg{width:24px;height:24px}
  .home-card .body{flex:1;min-width:0}
  .home-card .name{font-size:17px;font-weight:750;letter-spacing:-.02em}
  .home-card .addr{color:var(--muted);font-size:13.5px;margin-top:2px;font-weight:500}
  .home-card .chev{color:#CFC8BA;flex:0 0 auto;display:flex}
  .home-card .chev svg{width:20px;height:20px}

  .pill{display:inline-flex;align-items:center;font-size:11.5px;font-weight:650;padding:4px 11px;
    border-radius:999px;letter-spacing:0}
  .pill.green{background:var(--green-tint);color:var(--green)}
  .pill.red{background:var(--red-tint);color:var(--red)}
  .pill.amber{background:var(--amber-tint);color:#A9690A}
  .pill.slate{background:var(--slate-tint);color:var(--slate)}
  .pill.gold{background:var(--gold-tint);color:var(--gold-deep)}

  .meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;align-items:center}

  .empty{text-align:center;color:var(--muted);padding:54px 24px}
  .empty .ic{width:62px;height:62px;border-radius:20px;margin:0 auto 16px;display:flex;
    align-items:center;justify-content:center;background:var(--gold-tint);color:var(--gold-deep)}
  .empty .ic svg{width:28px;height:28px}
  .empty p{margin:0 0 5px;font-weight:700;color:var(--text);font-size:16px;letter-spacing:-.01em}
  .empty span{font-size:14px;font-weight:500;line-height:1.5}

  .summary{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
  .stat{background:var(--card);border-radius:16px;padding:15px 16px;box-shadow:var(--sh)}
  .stat .lbl{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);
    font-weight:700}
  .stat .num{font-size:25px;font-weight:800;margin-top:5px;letter-spacing:-.035em}
  .stat .num.sm{font-size:19px;letter-spacing:-.025em}

  /* photos */
  .pgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}
  .photo{position:relative;border-radius:16px;overflow:hidden;background:#EAE6DC;
    aspect-ratio:1/1;box-shadow:var(--sh)}
  .photo img{width:100%;height:100%;object-fit:cover;display:block}
  .photo .tagchip{position:absolute;top:9px;left:9px;backdrop-filter:blur(6px)}
  .photo .del{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;
    background:rgba(20,16,11,.55);color:#fff;font-size:15px;display:flex;align-items:center;
    justify-content:center;backdrop-filter:blur(6px)}
  .photo .note{position:absolute;bottom:0;left:0;right:0;padding:18px 10px 8px;color:#fff;
    font-size:12.5px;font-weight:500;background:linear-gradient(transparent,rgba(0,0,0,.78))}

  .iconbtn{padding:7px 10px;border-radius:10px;font-size:13px;font-weight:650;color:var(--muted)}
  .iconbtn:active{background:var(--line)}
  .check{width:26px;height:26px;border-radius:9px;border:2px solid var(--line);flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;
    transition:background .15s,border-color .15s}
  .check.on{background:var(--green);border-color:var(--green)}

  /* ---------- MODAL ---------- */
  .scrim{position:fixed;inset:0;background:rgba(20,16,11,.42);z-index:90;display:flex;
    align-items:flex-end;justify-content:center;backdrop-filter:blur(3px);animation:fade .2s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .sheet{background:var(--bg);width:100%;max-width:560px;border-radius:26px 26px 0 0;
    padding:10px 20px calc(env(safe-area-inset-bottom) + 24px);max-height:92dvh;overflow-y:auto;
    animation:rise .26s cubic-bezier(.32,.72,0,1);box-shadow:var(--sh-lg)}
  @keyframes rise{from{transform:translateY(40px)}to{transform:translateY(0)}}
  .grab{width:40px;height:5px;background:#D8D2C6;border-radius:3px;margin:8px auto 16px}
  .sheet h3{margin:0 0 18px;font-size:21px;font-weight:800;letter-spacing:-.025em}
  .sheet .field input,.sheet .field select,.sheet .field textarea{width:100%;padding:13px 14px;
    border:1.5px solid var(--line);border-radius:13px;background:var(--card);color:var(--text);
    font-weight:500}
  .sheet .field textarea{min-height:66px;resize:vertical}
  .sheet .field input:focus,.sheet .field select:focus,.sheet .field textarea:focus{
    outline:none;border-color:var(--gold)}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .tagrow{display:flex;gap:8px;flex-wrap:wrap}
  .tagopt{padding:10px 15px;border-radius:12px;border:1.5px solid var(--line);font-size:13.5px;
    font-weight:600;color:var(--text2);background:var(--card);transition:.12s}
  .tagopt.on{color:#fff;border-color:transparent}
  .tagopt.on[data-c=red]{background:var(--red)} .tagopt.on[data-c=amber]{background:var(--amber)}
  .tagopt.on[data-c=slate]{background:var(--slate)}
  .sheet .btn{margin-top:10px}

  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(60px);
    background:var(--ink);color:#F6F1E6;padding:13px 22px;border-radius:14px;font-size:14px;
    font-weight:600;z-index:120;opacity:0;transition:.28s cubic-bezier(.32,.72,0,1);
    box-shadow:var(--sh-lg)}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .spinner{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--gold);
    border-radius:50%;animation:spin .7s linear infinite;margin:48px auto}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}

</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="auth">
  <div class="brand">
    <div class="mark">EverStone Homes</div>
    <h1>Field</h1>
    <div class="sub">Build tracking, in your pocket</div>
  </div>
  <div class="authcard">
    <div class="field">
      <label>Email</label>
      <input id="email" type="email" autocomplete="email" inputmode="email" placeholder="you@everstoneiowa.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input id="pass" type="password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button class="btn btn-gold" id="signinBtn">Sign in</button>
    <button class="btn btn-ghost" id="signupBtn">Create my account</button>
    <div class="authmsg" id="authmsg"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hidden">
  <div id="topwrap">
    <div class="topbar">
      <button class="back hidden" id="backBtn">‹</button>
      <div class="ttl"><div class="k" id="topK">Your Homes</div><div class="v" id="topV">EverStone Field</div></div>
      <button class="act" id="logoutBtn">Sign out</button>
    </div>
    <div class="tabs hidden" id="tabs"></div>
  </div>
  <div class="content" id="content"></div>
</div>

<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================================
   CONFIG — paste your two Supabase values here (see SETUP.md)
   ============================================================ */
const SUPABASE_URL  = "https://snnatpcpefztznbgpyqg.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNubmF0cGNwZWZ6dHpuYmdweXFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NjA4MDgsImV4cCI6MjA5NzAzNjgwOH0.huMJWGG9xQIom5-O-NPWqH_xjd5X_nfqSvkyA5st0cQ";
/* ============================================================ */

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const SECTIONS = ["Overview","Loan","Expenses","Contractors","Schedule","Photos","Invoices"];
let state = { user:null, home:null, section:"Overview" };

const $ = id => document.getElementById(id);
const ICONS={
  plus:'<path d="M12 5v14M5 12h14"/>',
  home:'<path d="M3 11.4 12 4l9 7.4"/><path d="M5 10v10h14V10"/>',
  bank:'<path d="M3 9.5 12 4l9 5.5"/><path d="M5 10v8M9.5 10v8M14.5 10v8M19 10v8"/><path d="M3 21h18"/>',
  receipt:'<path d="M5 3v18l2-1.4L9 21l2-1.4L13 21l2-1.4L17 21l2-1.4V3l-2 1.4L15 3l-2 1.4L11 3 9 4.4 7 3Z"/><path d="M8.5 8.5h7M8.5 12.5h7"/>',
  users:'<circle cx="9" cy="8" r="3.2"/><path d="M3 20c0-3.4 2.7-6 6-6s6 2.6 6 6"/><path d="M16 5a3 3 0 0 1 0 6"/><path d="M21 20c0-2.6-1.6-4.8-3.8-5.7"/>',
  calendar:'<rect x="3.5" y="5" width="17" height="16" rx="3"/><path d="M3.5 10h17M8 3v4M16 3v4"/>',
  camera:'<path d="M4 8h2.6L8 6h8l1.4 2H20a1 1 0 0 1 1 1v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9a1 1 0 0 1 1-1Z"/><circle cx="12" cy="13" r="3.3"/>',
  invoice:'<path d="M6 3h12v18l-3-2-3 2-3-2-3 2Z"/><path d="M9 8h6M9 12h6"/>',
  chev:'<path d="m9 6 6 6-6 6"/>'
};
function ic(name,size,sw){size=size||24;sw=sw||1.8;return `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||""}</svg>`;}
const esc = s => (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const money = n => "$" + (Number(n)||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fdate = d => d ? new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}) : "";
function toast(m){const t=$("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1900);}

/* ---------- AUTH ---------- */
function authMsg(m,ok){const e=$("authmsg");e.textContent=m;e.classList.toggle("ok",!!ok);}

async function signIn(){
  const email=$("email").value.trim(), password=$("pass").value;
  if(!email||!password){authMsg("Enter your email and password.");return;}
  authMsg("Signing in…",true);
  const {error}=await sb.auth.signInWithPassword({email,password});
  if(error){authMsg(error.message);} else {authMsg("");}
}
async function signUp(){
  const email=$("email").value.trim(), password=$("pass").value;
  if(!email||!password){authMsg("Enter an email and a password (6+ characters).");return;}
  authMsg("Creating your account…",true);
  const {data,error}=await sb.auth.signUp({email,password});
  if(error){authMsg(error.message);}
  else if(data.session){authMsg("");}
  else {authMsg("Account made. Check your email to confirm, then sign in.",true);}
}
$("signinBtn").onclick=signIn;
$("signupBtn").onclick=signUp;
$("pass").addEventListener("keydown",e=>{if(e.key==="Enter")signIn();});
$("logoutBtn").onclick=async()=>{await sb.auth.signOut();};

sb.auth.onAuthStateChange((_e,session)=>{
  state.user = session?.user || null;
  if(state.user){ $("auth").classList.add("hidden"); $("app").classList.remove("hidden"); openHomes(); }
  else { $("app").classList.add("hidden"); $("auth").classList.remove("hidden"); $("pass").value=""; }
});

/* ---------- NAV ---------- */
$("backBtn").onclick=openHomes;
function setTop(k,v,back){ $("topK").textContent=k; $("topV").textContent=v;
  $("backBtn").classList.toggle("hidden",!back); }

function openHomes(){
  state.home=null;
  setTop("Your Homes","EverStone Field",false);
  $("tabs").classList.add("hidden");
  renderHomes();
}
function openHome(home){
  state.home=home; state.section="Overview";
  setTop("Project",home.name,true);
  renderTabs(); renderSection();
}
function renderTabs(){
  const t=$("tabs"); t.classList.remove("hidden");
  t.innerHTML=SECTIONS.map(s=>`<button class="tab ${s===state.section?'on':''}" data-s="${s}">${s}</button>`).join("");
  t.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{state.section=b.dataset.s;renderTabs();renderSection();});
}

/* ---------- DATA ---------- */
async function getRows(table,extra){
  let q=sb.from(table).select("*").eq("home_id",state.home.id);
  if(extra) q=extra(q);
  const {data,error}=await q;
  if(error){toast("Load error: "+error.message);return[];}
  return data||[];
}
function loading(){ $("content").innerHTML='<div class="spinner"></div>'; }

/* ============ HOMES LIST ============ */
async function renderHomes(){
  loading();
  const {data,error}=await sb.from("homes").select("*").order("created_at",{ascending:false});
  if(error){$("content").innerHTML=`<div class="empty"><p>Couldn't load.</p><span>${esc(error.message)}</span></div>`;return;}
  let html=`<div class="sec-h"><h2>Homes</h2><button class="add" onclick="homeForm()">${ic('plus',16)} New home</button></div>`;
  if(!data.length){
    html+=emptyBox("home","No homes yet","Add your first build to start tracking it.");
  } else {
    html+=data.map(h=>`
      <div class="home-card" onclick='openHome(${JSON.stringify(h).replace(/'/g,"&#39;")})'>
        <div class="home-ic">${ic("home",24)}</div>
        <div class="body">
          <div class="name">${esc(h.name)}</div>
          ${h.address?`<div class="addr">${esc(h.address)}</div>`:""}
          <div class="meta">
            <span class="pill gold">${esc(h.status||"Planning")}</span>
            ${h.plan?`<span class="sub" style="margin:0">${esc(h.plan)}</span>`:""}
          </div>
        </div>
        <div class="chev">${ic("chev",20)}</div>
      </div>`).join("");
  }
  $("content").innerHTML=html;
}

/* ============ SECTION ROUTER ============ */
function renderSection(){
  const s=state.section;
  if(s==="Overview")    return renderOverview();
  if(s==="Loan")        return renderLoan();
  if(s==="Expenses")    return renderExpenses();
  if(s==="Contractors") return renderContractors();
  if(s==="Schedule")    return renderSchedule();
  if(s==="Photos")      return renderPhotos();
  if(s==="Invoices")    return renderInvoices();
}

/* ---------- OVERVIEW ---------- */
async function renderOverview(){
  loading();
  const [exp,inv,sch,pho,con]=await Promise.all([

/* ---------- LOAN ---------- */
async function renderLoan(){
  loading();
  const inv=await getRows("invoices");
  const drawn=inv.filter(i=>i.paid).reduce((a,i)=>a+Number(i.amount||0),0);
  const loan=Number(state.home.loan_amount||0);
  const pct=loan>0?drawn/loan:0;
  const shown=Math.max(0,Math.min(pct,1));
  const over=pct>1;
  const remaining=loan-drawn;
  const R=80, C=2*Math.PI*R, offset=C*(1-shown);
  const ringColor=over?"var(--red)":pct>=0.85?"var(--amber)":"var(--gold)";
  let html=`<div class="sec-h"><h2>Construction Loan</h2><button class="add" onclick="loanForm()">${loan>0?"Edit amount":"Set amount"}</button></div>`;
  if(loan<=0){
    html+=emptyBox("bank","No loan amount set","Add your construction loan amount and the gauge fills as invoices are paid.");
    $("content").innerHTML=html; return;
  }
  html+=`
    <div class="card" style="text-align:center;padding:26px 16px 20px">
      <svg viewBox="0 0 200 200" width="210" height="210" style="max-width:64vw">
        <circle cx="100" cy="100" r="${R}" fill="none" stroke="var(--line)" stroke-width="15"/>
        <circle id="ringFill" cx="100" cy="100" r="${R}" fill="none" stroke="${ringColor}" stroke-width="15"
          stroke-linecap="round" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${C.toFixed(1)}"
          transform="rotate(-90 100 100)" style="transition:stroke-dashoffset 1.1s cubic-bezier(.4,0,.2,1)"/>
        <text x="100" y="96" text-anchor="middle" font-size="36" font-weight="750" fill="var(--text)">${Math.round(pct*100)}%</text>
        <text x="100" y="120" text-anchor="middle" font-size="12" letter-spacing="2" fill="var(--muted)" font-weight="600">DRAWN</text>
      </svg>
      ${over?`<div><span class="pill red" style="margin-top:8px">Over loan by ${money(drawn-loan)}</span></div>`:""}
    </div>
    <div class="summary">
      <div class="stat"><div class="lbl">Loan amount</div><div class="num sm">${money(loan)}</div></div>
      <div class="stat"><div class="lbl">Drawn so far</div><div class="num sm">${money(drawn)}</div></div>
      <div class="stat" style="grid-column:1/-1"><div class="lbl">Remaining on loan</div>
        <div class="num" style="color:${remaining<0?"var(--red)":"var(--green)"}">${money(remaining)}</div></div>
    </div>
    <p style="color:var(--muted);font-size:13px;text-align:center;margin-top:2px">
      The gauge counts invoices marked paid. Mark more invoices paid in the Invoices tab and it updates here.</p>`;
  $("content").innerHTML=html;
  requestAnimationFrame(()=>{const f=$("ringFill");if(f)f.setAttribute("stroke-dashoffset",offset.toFixed(1));});
}

  openSheet(`<h3>Construction loan</h3>

const TAGS=[["Needs Fixed","red"],["Look Out","amber"],["Other","slate"]];
function tagCls(t){const m={"Needs Fixed":"red","Look Out":"amber","Other":"slate"};return m[t]||"slate";}
async function renderPhotos(){

  let html=`<div class="sec-h"><h2>Photos</h2><label class="add" for="photoInput">${ic('plus',16)} Add photo</label></div>

  if(!rows.length) html+=emptyBox("camera","No photos yet","Snap jobsite shots and tag what needs attention.");
  else html+=`<div class="pgrid" id="pgrid">`+rows.map(p=>`
    <div class="photo" data-path="${esc(p.storage_path)}" id="ph_${p.id}">
      <span class="tagchip pill ${tagCls(p.tag)}">${esc(p.tag)}</span>
      <button class="del" onclick="delPhoto('${p.id}','${esc(p.storage_path)}')">✕</button>
      ${p.note?`<div class="note">${esc(p.note)}</div>`:""}
    </div>`).join("")+`</div>`;

async function signImg(id,path){
  const {data}=await sb.storage.from("home-photos").createSignedUrl(path,3600);
  const el=$("ph_"+id);if(el&&data?.signedUrl){const img=new Image();img.src=data.signedUrl;
    el.insertBefore(img,el.firstChild);}
}
let pendingFile=null;
function onPhotoPick(e){
  const f=e.target.files[0]; if(!f)return; pendingFile=f; photoTagSheet();
}
async function uploadPhoto(tag,note){
  const f=pendingFile; if(!f)return; closeModal();
  toast("Uploading…");
  const ext=(f.name.split(".").pop()||"jpg").toLowerCase();
  const path=`${state.user.id}/${state.home.id}/${Date.now()}.${ext}`;
  const {error:upErr}=await sb.storage.from("home-photos").upload(path,f,{contentType:f.type});
  if(upErr){toast(upErr.message);return;}
  const {error}=await sb.from("photos").insert({home_id:state.home.id,storage_path:path,tag,note:note||null});
  if(error){toast(error.message);return;}
  pendingFile=null; toast("Photo added"); renderPhotos();
}
async function delPhoto(id,path){
  if(!confirm("Delete this photo?"))return;
  await sb.storage.from("home-photos").remove([path]);
  const {error}=await sb.from("photos").delete().eq("id",id);
  if(error)toast(error.message);else{toast("Deleted");renderPhotos();}
}

function j(o){return JSON.stringify(o).replace(/'/g,"&#39;").replace(/"/g,"&quot;");}
function openSheet(html){

async function save(table,id,obj,after){

  else res=await sb.from(table).insert({...obj,home_id:state.home?state.home.id:null});
  if(res.error){toast(res.error.message);return;}
  closeModal();toast("Saved");after();
}
async function del(table,id,after){
  if(!confirm("Delete this?"))return;
  const {error}=await sb.from(table).delete().eq("id",id);
  if(error)toast(error.message);else{closeModal();toast("Deleted");after();}
}
function delRow(table,id,after){ // for buttons inside sheets
  return `<button class="btn" style="color:var(--red);background:#FBE7E4;margin-top:10px"
    onclick="del('${table}','${id}',${after})">Delete</button>`;
}

function emptyBox(name,t,s){return `<div class="empty"><div class="ic">${ic(name,28)}</div><p>${t}</p><span>${s}</span></div>`;}

/* PWA service worker */
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}
</script>
